  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

u002Fh1>\n      <\u002Fdiv>\n      <button onclick=\"{{ openSettings }}\" aria-label=\"Einstellungen &amp; Sync\" style=\"flex:0 0 auto;position:relative;display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;cursor:pointer;background:#fbf6ec;border:1.5px solid rgba(56,48,42,.12);border-radius:13px;color:#5d5138\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-2.7-1.1l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.1-2.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z\"><\u002Fpath><\u002Fsvg>\n        <span style=\"position:absolute;top:-3px;right:-3px;width:13px;height:13px;border-radius:50%;border:2px solid #ece1cd;background:{{ syncDot }}\"><\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"padding:18px 16px 0\">\n\n    <!-- ============ HEUTE ============ -->\n    <sc-if value=\"{{ isHeute }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"animation:fadeUp .4s ease both\">\n        <sc-if value=\"{{ todayPrep.show }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:linear-gradient(135deg,#3a4a2d,#2c3722);border-radius:20px;padding:18px;margin-bottom:18px;color:#eef0e3\">\n            <div style=\"font:700 10.5px/1 'Hanken Grotesk',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#c5d4a3;margin-bottom:7px\">Sonntag · Meal-Prep<\u002Fdiv>\n            <div style=\"font:600 17px/1.3 'Bricolage Grotesque',sans-serif;margin-bottom:13px\">Heute fürs ganze Woche vorbereiten<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:11px\">\n              <sc-for list=\"{{ prepItems }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:11px;align-items:flex-start\">\n                  <span style=\"flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#dbe6bf\">{{ p.iconEl }}<\u002Fspan>\n                  <div><div style=\"font:600 13.5px 'Hanken Grotesk',sans-serif;margin-bottom:3px\">{{ p.label }}<\u002Fdiv><div style=\"font:400 12.5px/1.5 'Hanken Grotesk',sans-serif;color:#bcc7a8\">{{ p.detail }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ todayMeals }}\" as=\"meal\" hint-placeholder-count=\"3\">\n          <dc-import name=\"MealCard\" meal=\"{{ meal }}\" hint-size=\"100%,80px\"><\u002Fdc-import>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ PLAN ============ -->\n    <sc-if value=\"{{ isPlan }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease both\">\n        <div style=\"display:flex;gap:8px;overflow-x:auto;padding:0 0 12px\">\n          <sc-for list=\"{{ weekTabs }}\" as=\"wt\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ wt.onClick }}\" style=\"flex:0 0 auto;border:none;cursor:pointer;font:600 13px 'Hanken Grotesk',sans-serif;padding:9px 16px;border-radius:999px;background:{{ wt.bg }};color:{{ wt.color }};transition:.18s ease\">{{ wt.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ showProgressBar }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#fbf6ec;border-radius:16px;padding:14px 16px;margin:2px 0 14px;border:1px solid rgba(56,48,42,.06)\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px\">\n              <span style=\"font:600 13.5px 'Hanken Grotesk',sans-serif;color:#38302a\">{{ progressLabel }}<\u002Fspan>\n              <span style=\"font:700 12.5px 'Hanken Grotesk',sans-serif;color:#bd5f37\">{{ progressCount }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:8px;border-radius:99px;background:#e4d6bd;overflow:hidden\">\n              <div style=\"height:100%;border-radius:99px;background:linear-gradient(90deg,#d39b4e,#c4673f);width:{{ progressPct }}%;transition:width .5s cubic-bezier(.4,0,.2,1)\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"position:relative;margin-bottom:11px\">\n          <svg style=\"position:absolute;left:14px;top:50%;transform:translateY(-50%)\" width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#b3a489\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4-4\"><\u002Fpath><\u002Fsvg>\n          <input value=\"{{ search }}\" oninput=\"{{ onSearch }}\" placeholder=\"Rezept oder Zutat suchen…\" style=\"width:100%;border:1.5px solid rgba(56,48,42,.12);background:#fbf6ec;border-radius:13px;padding:12px 14px 12px 40px;font:400 14px 'Hanken Grotesk',sans-serif;color:#38302a;outline:none\">\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:7px;overflow-x:auto;padding-bottom:16px\">\n          <sc-for list=\"{{ filterChips }}\" as=\"fc\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ fc.onClick }}\" style=\"flex:0 0 auto;cursor:pointer;border:1.5px solid {{ fc.border }};background:{{ fc.bg }};color:{{ fc.color }};font:600 12.5px 'Hanken Grotesk',sans-serif;padding:7px 13px;border-radius:999px;white-space:nowrap;transition:.15s ease\">{{ fc.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ showPrep }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#f6edda;border:1px solid rgba(189,95,55,.18);border-radius:18px;padding:16px;margin-bottom:20px\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:13px\">\n              <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#bd5f37\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4.5\" width=\"18\" height=\"17\" rx=\"2.5\"><\u002Frect><path d=\"M3 9h18M8 2v4M16 2v4\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font:700 13px 'Hanken Grotesk',sans-serif;color:#38302a\">Sonntags vorbereiten · ~20–30 Min.<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:11px\">\n              <sc-for list=\"{{ prepItems }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:11px;align-items:flex-start\">\n                  <span style=\"flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:rgba(196,103,63,.1);display:flex;align-items:center;justify-content:center;color:#bd5f37\">{{ p.iconEl }}<\u002Fspan>\n                  <div><div style=\"font:600 13.5px 'Hanken Grotesk',sans-serif;color:#38302a;margin-bottom:3px\">{{ p.label }}<\u002Fdiv><div style=\"font:400 12.5px/1.5 'Hanken Grotesk',sans-serif;color:#8a7c66\">{{ p.detail }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-for list=\"{{ days }}\" as=\"day\" hint-placeholder-count=\"7\">\n          <div style=\"margin-bottom:24px\">\n            <div style=\"display:flex;align-items:baseline;gap:10px;margin:0 2px 13px\">\n              <h3 style=\"margin:0;font:700 20px/1 'Bricolage Grotesque',sans-serif;color:#38302a;letter-spacing:-.01em\">{{ day.name }}<\u002Fh3>\n              <span style=\"font:600 11px 'Hanken Grotesk',sans-serif;letter-spacing:.04em;color:#b3a489\">{{ day.count }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ day.meals }}\" as=\"meal\" hint-placeholder-count=\"3\">\n              <dc-import name=\"MealCard\" meal=\"{{ meal }}\" hint-size=\"100%,80px\"><\u002Fdc-import>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:50px 20px;color:#8a7c66\">\n            <div style=\"font:600 16px 'Bricolage Grotesque',sans-serif;color:#38302a;margin-bottom:6px\">Keine Treffer<\u002Fdiv>\n            <div style=\"font:400 14px 'Hanken Grotesk',sans-serif\">Versuch eine andere Suche oder einen anderen Filter.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ EINKAUF ============ -->\n    <sc-if value=\"{{ isShop }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease both\">\n        <div style=\"display:flex;gap:8px;overflow-x:auto;padding:0 0 14px\">\n          <sc-for list=\"{{ weekTabs }}\" as=\"wt\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ wt.onClick }}\" style=\"flex:0 0 auto;border:none;cursor:pointer;font:600 13px 'Hanken Grotesk',sans-serif;padding:9px 16px;border-radius:999px;background:{{ wt.bg }};color:{{ wt.color }};transition:.18s ease\">{{ wt.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-for list=\"{{ shopSections }}\" as=\"sec\" hint-placeholder-count=\"2\">\n          <div style=\"background:#fbf6ec;border-radius:18px;padding:18px 17px;margin-bottom:16px;border:1px solid rgba(56,48,42,.06);box-shadow:0 5px 18px rgba(56,48,42,.05)\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px\">\n              <h3 style=\"margin:0;font:700 17px/1.2 'Bricolage Grotesque',sans-serif;color:#38302a\">{{ sec.title }}<\u002Fh3>\n              <span style=\"font:600 11px 'Hanken Grotesk',sans-serif;letter-spacing:.05em;color:#bd5f37\">{{ sec.meta }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font:500 12px 'Hanken Grotesk',sans-serif;color:#b3a489;margin-bottom:13px\">{{ sec.progressLabel }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:1px\">\n              <sc-for list=\"{{ sec.items }}\" as=\"it\" hint-placeholder-count=\"6\">\n                <button onclick=\"{{ it.onClick }}\" style=\"display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;background:transparent;border:none;border-bottom:1px solid rgba(56,48,42,.06);padding:11px 2px;opacity:{{ it.dim }};transition:opacity .2s ease\">\n                  <sc-if value=\"{{ it.checked }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"flex:0 0 auto;width:22px;height:22px;border-radius:7px;background:#6f7d52;display:flex;align-items:center;justify-content:center;color:#fff\">\n                      <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fspan>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ it.unchecked }}\" hint-placeholder-val=\"{{ true }}\">\n                    <span style=\"flex:0 0 auto;width:22px;height:22px;border-radius:7px;border:1.5px solid #cdbf a6;border:1.5px solid #cdbfa6;background:#fff\"><\u002Fspan>\n                  <\u002Fsc-if>\n                  <span style=\"font:500 14px 'Hanken Grotesk',sans-serif;color:#4d4338;text-decoration:{{ it.strike }}\">{{ it.text }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"margin-top:14px;display:inline-flex;align-items:center;gap:6px;font:600 13px 'Hanken Grotesk',sans-serif;color:#38302a;background:rgba(211,155,78,.14);padding:7px 12px;border-radius:10px\">{{ sec.cost }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <p style=\"font:400 12.5px/1.6 'Hanken Grotesk',sans-serif;color:#8a7c66;margin:6px 2px 0\">Gesamtkosten pro Woche zu zweit: ca. 125–140 €, je nach Vorrat. Mengen passen sich an die gewählte Personenzahl an.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ SAISON ============ -->\n    <sc-if value=\"{{ isSeason }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease both\">\n        <sc-for list=\"{{ seasonCards }}\" as=\"s\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fbf6ec;border-radius:18px;padding:18px 17px;margin-bottom:16px;border:1px solid rgba(56,48,42,.06);box-shadow:0 5px 18px rgba(56,48,42,.05)\">\n            <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#6f7d52;margin-bottom:7px\">Saisonal günstig<\u002Fdiv>\n            <h3 style=\"margin:0 0 13px;font:700 18px/1.2 'Bricolage Grotesque',sans-serif;color:#38302a\">{{ s.title }}<\u002Fh3>\n            <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px\">\n              <sc-for list=\"{{ s.chips }}\" as=\"c\" hint-placeholder-count=\"6\">\n                <span style=\"background:#f0e4cd;color:#5d5138;font:500 12.5px 'Hanken Grotesk',sans-serif;padding:6px 12px;border-radius:999px\">{{ c.t }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"margin:0;font:400 14px/1.6 'Hanken Grotesk',sans-serif;color:#5d5138\">{{ s.text }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"background:#f6edda;border:1px solid rgba(189,95,55,.16);border-radius:18px;padding:17px;margin-top:4px\">\n          <div style=\"font:700 13px 'Hanken Grotesk',sans-serif;color:#bd5f37;margin-bottom:7px\">Gut zu wissen<\u002Fdiv>\n          <p style=\"margin:0;font:400 13.5px/1.6 'Hanken Grotesk',sans-serif;color:#5d5138\">Bewusst ohne viel zusätzliches Salz — Geschmack kommt über Zitrone, Kräuter und Gewürze. Nach hartem Training gerne mehr Reis oder Kartoffeln ergänzen. Die Video-Buttons öffnen eine YouTube-Suche zum jeweiligen Gericht.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <nav style=\"position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;z-index:30;display:flex;background:rgba(251,246,236,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(56,48,42,.1);padding:8px 6px calc(8px + env(safe-area-inset-bottom))\">\n    <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n      <button onclick=\"{{ item.onClick }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:transparent;border:none;cursor:pointer;padding:6px 0;color:{{ item.color }};transition:color .18s ease\">\n        <span style=\"display:flex;height:24px;align-items:center\">{{ item.iconEl }}<\u002Fspan>\n        <span style=\"font:600 10.5px 'Hanken Grotesk',sans-serif;letter-spacing:.01em\">{{ item.label }}<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fnav>\n\n  <!-- ============ TAUSCH-SHEET ============ -->\n  <sc-if value=\"{{ swapOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeSwap }}\" style=\"position:fixed;inset:0;background:rgba(40,33,26,.45);z-index:40;animation:overlayFade .25s ease both\"><\u002Fdiv>\n    <div style=\"position:fixed;bottom:0;left:50%;width:100%;max-width:460px;max-height:78vh;background:#f3ead9;border-radius:24px 24px 0 0;z-index:41;display:flex;flex-direction:column;animation:sheetUp .3s cubic-bezier(.4,0,.2,1) both;box-shadow:0 -12px 44px rgba(40,33,26,.28)\">\n      <div style=\"padding:14px 18px 13px;border-bottom:1px solid rgba(56,48,42,.08)\">\n        <div style=\"width:38px;height:4px;border-radius:99px;background:#cdbfa6;margin:0 auto 13px\"><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px\">\n          <div style=\"display:flex;align-items:center;gap:10px;min-width:0\">\n            <sc-if value=\"{{ swapCreating }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ cancelCreate }}\" aria-label=\"Zurück\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:none;background:rgba(56,48,42,.08);cursor:pointer;color:#5d5138;font-size:19px;line-height:1\">‹<\u002Fbutton>\n            <\u002Fsc-if>\n            <div style=\"min-width:0\">\n              <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#bd5f37;margin-bottom:5px\">{{ swapEyebrow }}<\u002Fdiv>\n              <div style=\"font:700 17px 'Bricolage Grotesque',sans-serif;color:#38302a\">{{ swapHeader }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeSwap }}\" aria-label=\"Schließen\" style=\"flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:none;background:rgba(56,48,42,.08);cursor:pointer;color:#5d5138;font-size:16px\">✕<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"overflow-y:auto;padding:14px;flex:1\">\n\n        <sc-if value=\"{{ swapListing }}\" hint-placeholder-val=\"{{ true }}\">\n          <button onclick=\"{{ startCreate }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;width:100%;cursor:pointer;background:#38302a;border:none;border-radius:13px;padding:14px;margin-bottom:14px;font:600 14px 'Hanken Grotesk',sans-serif;color:#f3ead9\">\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg> Eigenes Gericht erstellen\n          <\u002Fbutton>\n\n          <sc-if value=\"{{ swapHasOverride }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ swapResetBtn }}\" style=\"display:flex;align-items:center;gap:9px;width:100%;cursor:pointer;background:transparent;border:1.5px dashed #c9a86f;border-radius:13px;padding:13px 15px;margin-bottom:14px;font:600 13.5px 'Hanken Grotesk',sans-serif;color:#bd5f37\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5\"><\u002Fpath><\u002Fsvg> Original wiederherstellen\n            <\u002Fbutton>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ hasCustom }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#6f7d52;margin:4px 2px 9px\">Meine Gerichte<\u002Fdiv>\n            <sc-for list=\"{{ customList }}\" as=\"opt\" hint-placeholder-count=\"1\">\n              <div style=\"display:flex;align-items:stretch;gap:8px;margin-bottom:8px\">\n                <button onclick=\"{{ opt.onPick }}\" style=\"display:flex;align-items:center;gap:12px;flex:1;min-width:0;text-align:left;cursor:pointer;background:{{ opt.bg }};border:1.5px solid {{ opt.border }};border-radius:13px;padding:12px 14px\">\n                  <span style=\"flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:rgba(196,103,63,.1);display:flex;align-items:center;justify-content:center;color:#bd5f37\">{{ opt.iconEl }}<\u002Fspan>\n                  <span style=\"flex:1;min-width:0\">\n                    <span style=\"display:block;font:700 10px 'Hanken Grotesk',sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#6f7d52;margin-bottom:3px\">Eigenes<\u002Fspan>\n                    <span style=\"display:block;font:600 14px 'Hanken Grotesk',sans-serif;color:#38302a\">{{ opt.title }}<\u002Fspan>\n                  <\u002Fspan>\n                  <sc-if value=\"{{ opt.current }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"flex:0 0 auto;font:700 10px 'Hanken Grotesk',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#6f7d52;background:rgba(111,125,82,.14);padding:4px 8px;border-radius:7px\">Aktuell<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fbutton>\n                <button onclick=\"{{ opt.onDelete }}\" aria-label=\"Löschen\" style=\"flex:0 0 auto;width:44px;border-radius:13px;border:1.5px solid rgba(56,48,42,.08);background:#fbf6ec;cursor:pointer;color:#b5654a;display:flex;align-items:center;justify-content:center\">\n                  <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#a7997f;margin:15px 2px 9px\">Aus der Rotation<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-for list=\"{{ swapList }}\" as=\"opt\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ opt.onPick }}\" style=\"display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;background:{{ opt.bg }};border:1.5px solid {{ opt.border }};border-radius:13px;padding:12px 14px;margin-bottom:8px\">\n              <span style=\"flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:rgba(196,103,63,.1);display:flex;align-items:center;justify-content:center;color:#bd5f37\">{{ opt.iconEl }}<\u002Fspan>\n              <span style=\"flex:1;min-width:0\">\n                <span style=\"display:block;font:600 10px 'Hanke 02Fpath><circle cx=\"12\" cy=\"12.5\" r=\"3.5\"><\u002Fcircle><\u002Fsvg>\n              <span style=\"font:600 13px 'Hanken Grotesk',sans-serif\">Foto hinzufügen (optional)<\u002Fspan>\n              <input type=\"file\" accept=\"image/*\" onchange=\"{{ onPhoto }}\" style=\"display:none\">\n            <\u002Flabel>\n          <\u002Fsc-if>\n\n          <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#bd5f37;margin-bottom:8px\">Name des Gerichts<\u002Fdiv>\n          <input value=\"{{ draftTitle }}\" oninput=\"{{ onDraftTitle }}\" placeholder=\"z. B. Omas Gemüsesuppe\" style=\"width:100%;border:1.5px solid rgba(56,48,42,.12);background:#fbf6ec;border-radius:12px;padding:12px 14px;font:500 15px 'Hanken Grotesk',sans-serif;color:#38302a;outline:none;margin-bottom:16px\">\n\n          <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#bd5f37;margin-bottom:8px\">Symbol<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px\">\n            <sc-for list=\"{{ iconOptions }}\" as=\"ico\" hint-placeholder-count=\"9\">\n              <button onclick=\"{{ ico.onClick }}\" aria-label=\"Symbol\" style=\"flex:0 0 auto;width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:{{ ico.bg }};color:{{ ico.color }};border:1.5px solid {{ ico.border }}\">{{ ico.iconEl }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#bd5f37;margin-bottom:8px\">Zutaten <span style=\"font-weight:500;text-transform:none;letter-spacing:0;color:#a7997f\">— eine pro Zeile<\u002Fspan><\u002Fdiv>\n          <textarea value=\"{{ draftIngText }}\" oninput=\"{{ onDraftIng }}\" rows=\"5\" placeholder=\"Karotten 3 Stück\nGemüsebrühe 1 L\n…\" style=\"width:100%;border:1.5px solid rgba(56,48,42,.12);background:#fbf6ec;border-radius:12px;padding:12px 14px;font:400 14px/1.5 'Hanken Grotesk',sans-serif;color:#38302a;outline:none;resize:vertical;margin-bottom:16px\"><\u002Ftextarea>\n\n          <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#bd5f37;margin-bottom:8px\">Zubereitung <span style=\"font-weight:500;text-transform:none;letter-spacing:0;color:#a7997f\">— ein Schritt pro Zeile<\u002Fspan><\u002Fdiv>\n          <textarea value=\"{{ draftStepText }}\" oninput=\"{{ onDraftStep }}\" rows=\"5\" placeholder=\"Gemüse schneiden\nIn Brühe 20 Min. köcheln\n…\" style=\"width:100%;border:1.5px solid rgba(56,48,42,.12);background:#fbf6ec;border-radius:12px;padding:12px 14px;font:400 14px/1.5 'Hanken Grotesk',sans-serif;color:#38302a;outline:none;resize:vertical;margin-bottom:18px\"><\u002Ftextarea>\n\n          <button onclick=\"{{ saveCustom }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;width:100%;cursor:pointer;background:#6f7d52;border:none;border-radius:13px;padding:15px;font:700 15px 'Hanken Grotesk',sans-serif;color:#fff;opacity:{{ saveOpacity }}\">\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg> Speichern &amp; einsetzen\n          <\u002Fbutton>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ EINSTELLUNGEN / SYNC ============ -->\n  <sc-if value=\"{{ settingsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeSettings }}\" style=\"position:fixed;inset:0;background:rgba(40,33,26,.45);z-index:40;animation:overlayFade .25s ease both\"><\u002Fdiv>\n    <div style=\"position:fixed;bottom:0;left:50%;width:100%;max-width:460px;max-height:88vh;background:#f3ead9;border-radius:24px 24px 0 0;z-index:41;display:flex;flex-direction:column;animation:sheetUp .3s cubic-bezier(.4,0,.2,1) both;box-shadow:0 -12px 44px rgba(40,33,26,.28)\">\n      <div style=\"padding:14px 18px 13px;border-bottom:1px solid rgba(56,48,42,.08)\">\n        <div style=\"width:38px;height:4px;border-radius:99px;background:#cdbfa6;margin:0 auto 13px\"><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center\">\n          <div>\n            <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#bd5f37;margin-bottom:5px\">Einstellungen<\u002Fdiv>\n            <div style=\"font:700 17px 'Bricolage Grotesque',sans-serif;color:#38302a\">Sync &amp; Rezepte<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeSettings }}\" aria-label=\"Schließen\" style=\"width:34px;height:34px;border-radius:50%;border:none;background:rgba(56,48,42,.08);cursor:pointer;color:#5d5138;font-size:16px\">✕<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"overflow-y:auto;padding:16px 14px 26px\">\n\n        <div style=\"display:flex;align-items:center;gap:10px;background:#fbf6ec;border:1px solid rgba(56,48,42,.07);border-radius:14px;padding:13px 15px;margin-bottom:16px\">\n          <span style=\"flex:0 0 auto;width:11px;height:11px;border-radius:50%;background:{{ syncStatusDot }}\"><\u002Fspan>\n          <span style=\"flex:1;font:600 14px 'Hanken Grotesk',sans-serif;color:#38302a\">{{ syncStatusLabel }}<\u002Fspan>\n          <sc-if value=\"{{ syncIsOn }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ disconnectSync }}\" style=\"background:none;border:none;cursor:pointer;color:#b5654a;font:600 12.5px 'Hanken Grotesk',sans-serif;text-decoration:underline;padding:0\">Trennen<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasSyncMsg }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font:500 13px/1.5 'Hanken Grotesk',sans-serif;color:#5d5138;background:#f6edda;border:1px solid rgba(189,95,55,.18);border-radius:12px;padding:11px 13px;margin-bottom:16px\">{{ syncMsg }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#bd5f37;margin-bottom:9px\">Gemeinsamer Haushalts-Code<\u002Fdiv>\n        <input value=\"{{ household }}\" oninput=\"{{ onHousehold }}\" placeholder=\"z. B. mama-und-ich\" autocapitalize=\"off\" autocomplete=\"off\" spellcheck=\"false\" style=\"width:100%;border:1.5px solid rgba(56,48,42,.12);background:#fbf6ec;border-radius:12px;padding:12px 14px;font:500 15px 'Hanken Grotesk',sans-serif;color:#38302a;outline:none;margin-bottom:7px\">\n        <p style=\"margin:0 2px 16px;font:400 12px/1.5 'Hanken Grotesk',sans-serif;color:#a7997f\">Auf beiden Handys denselben Code eingeben — darüber findet ihr euch.<\u002Fp>\n\n        <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#bd5f37;margin-bottom:9px\">Firebase-Konfiguration<\u002Fdiv>\n        <textarea value=\"{{ cfgText }}\" oninput=\"{{ onCfgText }}\" rows=\"7\" placeholder=\"Hier den firebaseConfig-Block aus deinem Firebase-Projekt einfügen — z. B.\n{\n  apiKey: &quot;AIza…&quot;,\n  projectId: &quot;mein-plan&quot;,\n  appId: &quot;1:…&quot;\n}\" autocapitalize=\"off\" autocomplete=\"off\" spellcheck=\"false\" style=\"width:100%;border:1.5px solid rgba(56,48,42,.12);background:#fbf6ec;border-radius:12px;padding:12px 14px;font:400 13px/1.5 ui-monospace,Menlo,monospace;color:#38302a;outline:none;resize:vertical;margin-bottom:13px\"><\u002Ftextarea>\n\n        <button onclick=\"{{ saveSync }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;width:100%;cursor:pointer;background:#3a4a2d;border:none;border-radius:13px;padding:15px;font:700 15px 'Hanken Grotesk',sans-serif;color:#eef0e3;margin-bottom:9px\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 1 1-9-9c2.5 0 4.7 1 6.3 2.7L21 8\"><\u002Fpath><path d=\"M21 4v4h-4\"><\u002Fpath><\u002Fsvg>\n          Sync aktivieren\n        <\u002Fbutton>\n        <p style=\"margin:0 2px 22px;font:400 12px/1.6 'Hanken Grotesk',sans-serif;color:#a7997f\">Die Anleitung zum kostenlosen Firebase-Projekt steht in der Chat-Nachricht. Deine Eingaben bleiben nur auf diesem Handy gespeichert.<\u002Fp>\n\n        <div style=\"height:1px;background:repeating-linear-gradient(90deg,rgba(56,48,42,.16) 0 5px,transparent 5px 10px);margin-bottom:20px\"><\u002Fdiv>\n\n        <div style=\"font:700 10px/1 'Hanken Grotesk',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#6f7d52;margin-bottom:11px\">Rezepte sichern<\u002Fdiv>\n        <button onclick=\"{{ exportRecipes }}\" style=\"display:flex;align-items:center;gap:11px;width:100%;text-align:left;cursor:pointer;background:#fbf6ec;border:1.5px solid rgba(56,48,42,.1);border-radius:13px;padding:13px 15px;margin-bottom:9px\">\n          <span style=\"flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:rgba(111,125,82,.13);display:flex;align-items:center;justify-content:center;color:#6f7d52\">\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 4v11M8 11l4 4 4-4M5 19h14\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <span style=\"flex:1\"><span style=\"display:block;font:600 14px 'Hanken Grotesk',sans-serif;color:#38302a\">Alle Rezepte herunterladen<\u002Fspan><span style=\"display:block;font:400 12px 'Hanken Grotesk',sans-serif;color:#a7997f\">{{ recipeCount }} Rezepte · als Datei zum Wiedereinlesen<\u002Fspan><\u002Fspan>\n        <\u002Fbutton>\n        <label st n      dishPersons: saved.dishPersons || {},\n      open: {},\n      search: '',\n      filter: '',\n      swapFor: null,\n      creating: false,\n      draft: {title:'', icon:'bowl', photo:'', ingText:'', stepText:''},\n      settingsOpen: false,\n      cfgText: cfg.cfgText || '',\n      household: cfg.household || '',\n      syncStatus: 'off',\n      syncMsg: ''\n    };\n    this._pushTimer = null;\n    this._lastSync = '';\n  }\n\n  load(){ try { return JSON.parse(localStorage.getItem('ep_state') || '{}'); } catch(e){ return {}; } }\n  loadCfg(){ try { return JSON.parse(localStorage.getItem('ep_sync') || '{}'); } catch(e){ return {}; } }\n  // shared = the data that syncs across devices\n  sharedFrom(s){ return {done:s.done,favs:s.favs,shop:s.shop,overrides:s.overrides,customMeals:s.customMeals,dishPersons:s.dishPersons}; }\n  persistWith(patch){\n    const s = Object.assign({}, this.state, patch);\n    localStorage.setItem('ep_state', JSON.stringify({view:s.view,week:s.week,done:s.done,favs:s.favs,shop:s.shop,overrides:s.overrides,customMeals:s.customMeals,dishPersons:s.dishPersons}));\n    // sync only the shared keys, not local-only view/week\n    const sharedKeys = ['done','favs','shop','overrides','customMeals','dishPersons'];\n    if(sharedKeys.some(k => k in patch)) this.scheduleSync(this.sharedFrom(s));\n  }\n\n  // ---------- Firebase sync ----------\n  componentDidMount(){ if(this.state.cfgText && this.state.household) this.initFirebase(); }\n  parseCfg(text){\n    try {\n      let t = (text || '').trim();\n      const i = t.indexOf('{'), j = t.lastIndexOf('}');\n      if(i === -1 || j === -1) return null;\n      t = t.slice(i, j + 1);\n      // tolerate JS object literal: quote keys, single→double quotes, strip trailing commas\n      t = t.replace(/([,{]\\s*)([A-Za-z0-9_]+)\\s*:/g, '$1\"$2\":').replace(/'/g, '\"').replace(/,\\s*([}\\]])/g, '$1');\n      const o = JSON.parse(t);\n      return o.apiKey && o.projectId ? o : null;\n    } catch(e){ return null; }\n  }\n  initFirebase(){\n    const o = this.parseCfg(this.state.cfgText);\n    if(!o){ this.setState({syncStatus:'error', syncMsg:'Konfiguration ungültig.'}); return; }\n    if(typeof firebase === 'undefined'){\n      if((this._fbWait = (this._fbWait||0) + 1) < 25){ this.setState({syncStatus:'connecting'}); setTimeout(() => this.initFirebase(), 240); }\n      else this.setState({syncStatus:'error', syncMsg:'Firebase konnte nicht geladen werden (offline?).'});\n      return;\n    }\n    try {\n      if(!this._app) this._app = firebase.initializeApp(o);\n      const db = firebase.firestore(this._app);\n      this._doc = db.collection('haushalte').doc(this.state.household.trim().toLowerCase());\n      this.setState({syncStatus:'connecting', syncMsg:''});\n      this._unsub = this._doc.onSnapshot((snap) => {\n        const data = snap.data();\n        this.setState({syncStatus:'on'});\n        if(data && data.shared){\n          const ser = JSON.stringify(data.shared);\n          if(ser !== this._lastSync){ this._lastSync = ser; this.applyRemote(data.shared); }\n        } else {\n          // first time: push our local data up\n          this.scheduleSync(this.sharedFrom(this.state), 0);\n        }\n      }, (err) => { this.setState({syncStatus:'error', syncMsg:String(err && err.code || err)}); });\n    } catch(e){ this.setState({syncStatus:'error', syncMsg:String(e.message || e)}); }\n  }\n  applyRemote(shared){\n    const patch = {};\n    ['done','favs','shop','overrides','customMeals','dishPersons'].forEach(k => { if(shared[k]) patch[k] = shared[k]; });\n    this.setState(patch);\n    const s = Object.assign({}, this.state, patch);\n    localStorage.setItem('ep_state', JSON.stringify({view:this.state.view,week:this.state.week,done:s.done,favs:s.favs,shop:s.shop,overrides:s.overrides,customMeals:s.customMeals,dishPersons:s.dishPersons}));\n  }\n  scheduleSync(shared, delay){\n    if(!this._doc) return;\n    const ser = JSON.stringify(shared);\n    if(ser === th eps:m.steps});\n    })));\n    const data = { type:'ernaehrungsplan-rezepte', version:1, exportedAt:new Date().toISOString(),\n      rotation, custom: Object.values(this.state.customMeals) };\n    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = 'rezepte-' + new Date().toISOString().slice(0,10) + '.json';\n    document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n    this.setState({syncMsg:'✓ ' + (rotation.length + Object.keys(this.state.customMeals).length) + ' Rezepte exportiert.'});\n  }\n  onImportFile(e){\n    const file = e.target.files && e.target.files[0];\n    if(!file) return;\n    const reader = new FileReader();\n    reader.onload = (ev) => {\n      try {\n        const data = JSON.parse(ev.target.result);\n        const all = [].concat(data.rotation || [], data.custom || []);\n        const existing = Object.values(this.state.customMeals).map(m => m.title);\n        const customMeals = Object.assign({}, this.state.customMeals);\n        let added = 0;\n        all.forEach((m, i) => {\n          if(!m || !m.title || existing.indexOf(m.title) !== -1) return;\n          existing.push(m.title);\n          customMeals['c' + Date.now() + i] = {\n            title: m.title, icon: m.icon || 'bowl', photo: m.photo || '',\n            ing: m.ing || [], steps: m.steps || [], v: m.v || (m.title + ' Rezept')\n          };\n          added++;\n        });\n        this.setState({customMeals, syncMsg:'✓ ' + added + ' Rezepte importiert (in „Meine Gerichte\").'});\n        this.persistWith({customMeals});\n      } catch(err){ this.setState({syncMsg:'Datei konnte nicht gelesen werden.'}); }\n    };\n    reader.readAsText(file);\n    e.target.value = '';\n  }\n  toggleKey(obj, key){ const n = Object.assign({}, obj); if(n[key]) delete n[key]; else n[key] = true; return n; }\n\n  setView(v){ this.setState({view:v}); this.persistWith({view:v}); }\n  setWeek(i){ this.setState({week:i}); this.persistWith({week:i}); }\n  setDishPersons(base, n){ n = Math.min(5, Math.max(1, n)); const dp = Object.assign({}, this.state.dishPersons); if(n === this.defaultP) delete dp[base]; else dp[base] = n; this.setState({dishPersons:dp}); this.persistWith({dishPersons:dp}); }\n  toggleDone(b){ const done = this.toggleKey(this.state.done, b); this.setState({done}); this.persistWith({done}); }\n  toggleFav(b){ const favs = this.toggleKey(this.state.favs, b); this.setState({favs}); this.persistWith({favs}); }\n  toggleShop(id){ const shop = this.toggleKey(this.state.shop, id); this.setState({shop}); this.persistWith({shop}); }\n  toggleOpen(b){ this.setState({open: this.toggleKey(this.state.open, b)}); }\n  setFilter(v){ this.setState({filter: this.state.filter === v ? '' : v}); }\n  onSearch(e){ this.setState({search: e.target.value}); }\n  openSwap(b){ this.setState({swapFor:b}); }\n  closeSwap(){ this.setState({swapFor:null}); }\n  doSwap(base, w, d){\n    const m = base.match(/w(\\d+)d(\\d+)s(\\d+)/);\n    const ow = +m[1], od = +m[2];\n    const ov = Object.assign({}, this.state.overrides);\n    if(w === ow && d === od) delete ov[base]; else ov[base] = {w, d};\n    this.setState({overrides:ov, swapFor:null}); this.persistWith({overrides:ov});\n  }\n  resetSwap(base){ const ov = Object.assign({}, this.state.overrides); delete ov[base]; this.setState({overrides:ov, swapFor:null}); this.persistWith({overrides:ov}); }\n  doSwapCustom(base, id){ const ov = Object.assign({}, this.state.overrides); ov[base] = {custom:id}; this.setState({overrides:ov, swapFor:null}); this.persistWith({overrides:ov}); }\n\n  startCreate(){ this.setState({creating:true, draft:{title:'', icon:'bowl', photo:'', ingText:'', stepText:''}}); }\n  cancelCreate(){ this.setState({creating:false}); }\n  patchDraft(p){ this.setState({draft: Object.assign({}, this.state.draft, p)}); }\n  onDraftTitle(e){ this.patchDraft({title:e.target.value}); }\n  onDraftIng(e){ this.patchDraft({ingText:e.target.value}); }\n  onDraftStep(e){ this.patchDraft({stepText:e.target.value}); }\n  setDraftIcon(name){ this.patchDraft({icon:name}); }\n  removeDraftPhoto(e){ if(e) e.preventDefault(); this.patchDraft({photo:''}); }\n  onPhoto(e){\n    const file = e.target.files && e.target.files[0];\n    if(!file) return;\n    const reader = new FileReader();\n    reader.onload = (ev) => {\n      const img = new Image();\n      img.onload = () => {\n        const max = 720; let w = img.width, hh = img.height;\n        if(w >= hh){ if(w > max){ hh = Math.round(hh*max/w); w = max; } }\n        else { if(hh > max){ w = Math.round(w*max/hh); hh = max; } }\n        const cv = document.createElement('canvas'); cv.width = w; cv.height = hh;\n        cv.getContext('2d').drawImage(img, 0, 0, w, hh);\n        this.patchDraft({photo: cv.toDataURL('image/jpeg', 0.78)});\n      };\n      img.src = ev.target.result;\n    };\n    reader.readAsDataURL(file);\n  }\n  saveCustom(){\n    const d = this.state.draft;\n    if(!d.title.trim()) return;\n    const id = 'c' + Date.now();\n    const dish = {\n      title: d.title.trim(), icon: d.icon || 'bowl', photo: d.photo || '',\n      ing: d.ingText.split('\\n').map(s => s.trim()).filter(Boolean),\n      steps: d.stepText.split('\\n').map(s => s.trim()).filter(Boolean),\n      v: d.title.trim() + ' Rezept'\n    };\n    const customMeals = Object.assign({}, this.state.customMeals); customMeals[id] = dish;\n    const patch = {customMeals, creating:false};\n    if(this.state.swapFor){ const ov = Object.assign({}, this.state.overrides); ov[this.state.swapFor] = {custom:id}; patch.overrides = ov; patch.swapFor = null; }\n    this.setState(patch); this.persistWith(patch);\n  }\n  deleteCustom(id){\n    const customMeals = Object.assign({}, this.state.customMeals); delete customMeals[id];\n    const ov = Object.assign({}, this.state.overrides);\n    Object.keys(ov).forEach(k => { if(ov[k] && ov[k].custom === id) delete ov[k]; });\n    this.setState({customMeals, overrides:ov}); this.persistWith({customMeals, overrides:ov});\n  }\n\n  iconEl(name){ return React.createElement('span',{style:{display:'flex'},dangerouslySetInnerHTML:{__html:this.ICONS[name]||''}}); }\n\n  scaleQty(str, f){\n    if(f === 1) return str;\n    const frac = (v) => {\n      if(Number.isInteger(v)) return String(v);\n      const whole = Math.floor(v), fr = v - whole;\n      const map = {'0.5':'1/2','0.25':'1/4','0.75':'3/4','0.333':'1/3','0.667':'2/3'};\n      let f2 = '';\n      for(const k in map){ if(Math.abs(fr - parseFloat(k)) < 0.02){ f2 = map[k]; break; } }\n      if(!f2) return (whole + fr).toFixed(1).replace('.',',').replace(',0','');\n      return whole > 0 ? whole + ' ' + f2 : f2;\n    };\n    let s = str.replace(/\\d+\\/\\d+|\\d+,\\d+|\\d+/g, (t) => {\n      if(t.includes('/')){ const [a,b] = t.split('/').map(Number); return frac(a/b*f); }\n      if(t.includes(',')){ const v = parseFloat(t.replace(',','.')) * f; return Number.isInteger(v) ? String(v) : String(v).replace('.',','); }\n      return String(parseInt(t,10) * f);\n    });\n    s = s.replace(/([2-9]\\d*) Dose\\b/g, '$1 Dosen').replace(/([2-9]\\d*) Packung\\b/g, '$1 Packungen');\n    return s;\n  }\n\n  resolveMeal(wi, di, si){\n    const base = 'w' + wi + 'd' + di + 's' + si;\n    const ov = this.state.overrides[base];\n    let src, swapped = false, custom = false;\n    if(ov && ov.custom){\n      src = this.state.customMeals[ov.custom];\n      if(src){ swapped = true; custom = true; }\n      else src = this.weeks[wi][di].meals[si];\n    } else if(ov){\n      src = this.weeks[ov.w][ov.d].meals[si]; swapped = true;\n    } else {\n      src = this.weeks[wi][di].meals[si];\n    }\n    return {base, src, swapped, custom, si};\n  }\n\n  buildMeal(wi, di, si){\n    const {base, src, swapped, custom} = this.resolveMeal(wi, di, si);\n    const persons = this.state.dishPersons[base] || this.defaultP;\n    const f = persons / 2;\n    const done = !!this.state.done[base];\n    const fav = !!this.state.favs[base];\n    const open = !!this.state.open[base];\n    const ing = src.ing || [], steps = src.steps || [];\n    return {\n      id: base, base,\n      time: src.time || ['Frühstück','Mittag','Abend'][si],\n      title: src.title,\n      iconEl: this.iconEl(src.icon),\n      hasPhoto: !!src.photo,\n      photoEl: src.photo ? React.createElement('img', {src: src.photo, alt:'', style:{width:'100%',height:'165px',objectFit:'cover',borderRadius:'13px',marginBottom:'16px',display:'block'}}) : null,\n      custom,\n      ingredients: ing.map(t => ({text: this.scaleQty(t, f)})), hasIng: ing.length > 0,\n      steps: steps.map((t, i) => ({n: i + 1, text: t})), hasSteps: steps.length > 0,\n      videoUrl: 'https://www.youtube.com/results?search_query=' + encodeURIComponent(src.v || src.title),\n      done, fav, notFav: !fav, notDone: !done,\n      open, swapped,\n      rows: open ? '1fr' : '0fr',\n      chevStyle: 'transform:rotate(' + (open ? 180 : 0) + 'deg)',\n      cardBg: done ? '#eef0e6' : '#fbf6ec',\n      portionLabel: persons + (persons === 1 ? ' Person' : ' Personen'),\n      persons,\n      personsDimDec: persons <= 1 ? '.35' : '1',\n      personsDimInc: persons >= 5 ? '.35' : '1',\n      _src: src,\n      onOpen: () => this.toggleOpen(base),\n      onFav: (e) => { if(e) e.stopPropagation(); this.toggleFav(base); },\n      onDone: (e) => { if(e) e.stopPropagation(); this.toggleDone(base); },\n      onSwap: (e) => { if(e) e.stopPropagation(); this.openSwap(base); },\n      onReset: (e) => { if(e) e.stopPropagation(); this.resetSwap(base); },\n      onPersonDec: (e) => { if(e) e.stopPropagation(); this.setDishPersons(base, persons - 1); },\n      onPersonInc: (e) => { if(e) e.stopPropagation(); this.setDishPersons(base, persons + 1); }\n    };\n  }\n\n  mealMatches(meal, q, filter){\n    if(filter === 'fav') return meal.fav;\n    let ok = true;\n    const hay = (meal.title + ' ' + meal._src.ing.join(' ')).toLowerCase();\n    if(q) ok = hay.indexOf(q.toLowerCase()) !== -1;\n    if(ok && filter) ok = hay.indexOf(filter.toLowerCase()) !== -1;\n    return ok;\n  }\n\n  renderVals(){\n    const st = this.state;\n    const view = st.view;\n    const isHeute = view === 'heute', isPlan = view === 'plan', isShop = view === 'shop', isSeason = view === 'season';\n\n    // ---- header ----\n    const now = new Date();\n    const h = now.getHours();\n    const greeting = h < 11 ? 'Guten Morgen' : (h < 17 ? 'Mahlzeit' : 'Guten Abend');\n    const todayIdx = (now.getDay() + 6) % 7;\n    let topEyebrow = '', topTitle = '';\n    if(isHeute){ topEyebrow = 'Woche ' + (st.week + 1) + ' · ' + this.DAYS[todayIdx]; topTitle = greeting; }\n    else if(isPlan){ topEyebrow = '4-Wochen-Rotation'; topTitle = 'Wochenplan'; }\n    else if(isShop){ topEyebrow = 'Wocheneinkauf'; topTitle = 'Einkaufsliste'; }\n    else { topEyebrow = 'Saisonal kochen'; topTitle = 'Saison-Tipps'; }\n\n    // ---- nav ----\n    const navDef = [['heute','Heute'],['plan','Plan'],['shop','Einkauf'],['season','Saison']];\n    const navItems = navDef.map(([k, label]) => ({\n      key: k, label,\n      iconEl: React.createElement('span',{style:{display:'flex'},dangerouslySetInnerHTML:{__html:this.NAV[k]}}),\n      color: view === k ? '#c4673f' : '#a7997f',\n      onClick: () => this.setView(k)\n    }));\n\n    // ---- week tabs ----\n    const weekTabs = [0,1,2,3].map(i => ({\n      label: 'Woche ' + (i + 1), idx: i,\n      bg: st.week === i ? '#38302a' : '#f0e4cd',\n      color: st.week === i ? '#f3ead9' : '#8a7c66',\n      onClick: () => this.setWeek(i)\n    }));\n\n    // ---- plan days ----\n    const f = 1; // Einkaufsliste skaliert nicht mit der Personenzahl pro Gericht\n    const hasFilter = !!(st.search || st.filter);\n    const days = this.weeks[st.week].map((day, di) => {\n      const meals = [0,1,2].map(si => this.buildMeal(st.week, di, si))\n        .filter(m => this.mealMatches(m, st.search, st.filter));\n      return { name: day.day, count: meals.length + (meals.length === 1 ? ' Gericht' : ' Gerichte'), meals };\n    }).filter(day => day.meals.length > 0);\n    const noResults = hasFilter && days.length === 0;\n\n    // ---- progress ----\n    let doneCount = 0;\n    for(let di = 0; di < 7; di++) for(let si = 0; si < 3; si++) if(st.done['w' + st.week + 'd' + di + 's' + si]) doneCount++;\n    const progressPct = Math.round(doneCount / 21 * 100);\n    const progressLabel = doneCount >= 21 ? 'Woche komplett gekocht! 🎉' : 'Diese Woche gekocht';\n    const progressCount = doneCount + ' / 21';\n\n    // ---- filters ----\n    const fdefs = [['fav','★ Favoriten'],['Tofu','Tofu'],['Linsen','Linsen'],['Kichererbsen','Kichererbsen'],['Reis','Reis'],['Kartoffeln','Kartoffeln'],['Curry','Curry'],['Pasta','Pasta']];\n    const filterChips = fdefs.map(([val, label]) => {\n      const active = st.filter === val;\n      return { label, value: val,\n        bg: active ? '#c4673f' : 'transparent',\n        color: active ? '#fff' : '#8a7c66',\n        border: active ? '#c4673f' : '#d9ccb2',\n        onClick: () => this.setFilter(val) };\n    });\n\n    // ---- prep ----\n    const prepItems = this.weekPrep[st.week].map(p => ({ iconEl: this.iconEl(p.icon), label: p.label, detail: p.detail }));\n    const showPrep = isPlan && !hasFilter;\n\n    // ---- today ----\n    const todayMeals = [0,1,2].map(si => this.buildMeal(st.week, todayIdx, si));\n    const todayPrep = { show: todayIdx === 6 };\n\n    // ---- shop ----\n    const buildItems = (list, keyPrefix) => list.map((raw, i) => {\n      const id = keyPrefix + '-' + i;\n      const checked = !!st.shop[id];\n      return { id, text: this.scaleQty(raw, f), checked, unchecked: !checked,\n        strike: checked ? 'line-through' : 'none', dim: checked ? '0.5' : '1',\n        onClick: () => this.toggleShop(id) };\n    });\n    const basisItems = buildItems(this.shopBasis, 'basis');\n    const weekItems = buildItems(this.shopWeeks[st.week], 'w' + st.week);\n    const prog = (items) => { const c = items.filter(x => x.checked).length; return c + ' / ' + items.length + ' erledigt'; };\n    const shopSections = [\n      { key: 'basis', title: 'Basis-Vorrat', meta: 'Jede Woche', progressLabel: prog(basisItems), items: basisItems, cost: 'ca. 60–65 € / Woche' },\n      { key: 'week', title: 'Woche ' + (st.week + 1), meta: 'Zusätzlich', progressLabel: prog(weekItems), items: weekItems, cost: this.shopWeekCost[st.week] }\n    ];\n\n    // ---- season ----\n    const seasonCards = this.season.map(s => ({ title: s.title, text: s.text, chips: s.chips.map(t => ({t})) }));\n\n    // ---- swap sheet ----\n    const swapOpen = !!st.swapFor;\n    const swapCreating = swapOpen && st.creating;\n    const swapListing = swapOpen && !st.creating;\n    let swapTitle = '', swapList = [], swapHasOverride = false, customList = [];\n    const ovCur = swapOpen ? st.overrides[st.swapFor] : null;\n    if(swapOpen){\n      const m = st.swapFor.match(/w(\\d+)d(\\d+)s(\\d+)/);\n      const ow = +m[1], od = +m[2], si = +m[3];\n      swapTitle = ['Frühstück','Mittag','Abend'][si] + ' tauschen';\n      swapHasOverride = !!ovCur;\n      const cur = (ovCur && !ovCur.custom) ? ovCur : {w: ow, d: od};\n      this.weeks.forEach((wk, wi) => wk.forEach((day, di) => {\n        const mm = this.weeks[wi][di].meals[si];\n        swapList.push({\n          label: 'W' + (wi + 1) + ' · ' + day.day.slice(0,2),\n          title: mm.title,\n          iconEl: this.iconEl(mm.icon),\n          current: !(ovCur && ovCur.custom) && cur.w === wi && cur.d === di,\n          bg: (!(ovCur && ovCur.custom) && cur.w === wi && cur.d === di) ? 'rgba(111,125,82,.1)' : '#fbf6ec',\n          border: (!(ovCur && ovCur.custom) && cur.w === wi && cur.d === di) ? '#a9b487' : 'rgba(56,48,42,.08)',\n          onPick: () => this.doSwap(st.swapFor, wi, di)\n        });\n      }));\n    }\n    customList = Object.keys(st.customMeals).map(id => {\n      const dm = st.customMeals[id];\n      const isCur = ovCur && ovCur.custom === id;\n      return {\n        id, title: dm.title, iconEl: this.iconEl(dm.icon),\n        current: !!isCur,\n        bg: isCur ? 'rgba(111,125,82,.1)' : '#fbf6ec',\n        border: isCur ? '#a9b487' : 'rgba(56,48,42,.08)',\n        onPick: () => this.doSwapCustom(st.swapFor, id),\n        onDelete: (e) => { if(e) e.stopPropagation(); this.deleteCustom(id); }\n      };\n    });\n    const draft = st.draft || {title:'', icon:'bowl', photo:'', ingText:'', stepText:''};\n    const iconOptions = ['bowl','pot','pan','jar','glass','noodles','wrap','spud','stack'].map(n => ({\n      name: n, iconEl: this.iconEl(n),\n      bg: draft.icon === n ? '#c4673f' : '#fbf6ec',\n      color: draft.icon === n ? '#fff' : '#bd5f37',\n      border: draft.icon === n ? '#c4673f' : 'rgba(56,48,42,.12)',\n      onClick: () => this.setDraftIcon(n)\n    }));\n\n    // ---- settings / sync ----\n    const syncMap = {\n      off:   {dot:'#c4b69c', label:'Sync aus'},\n      connecting: {dot:'#d39b4e', label:'Verbinde…'},\n      on:    {dot:'#6f7d52', label:'Synchron'},\n      error: {dot:'#c0492f', label:'Sync-Fehler'}\n    };\n    const syncInfo = syncMap[st.syncStatus] || syncMap.off;\n    const recipeCount = 84 + Object.keys(st.customMeals).length;\n\n    return {\n      isHeute, isPlan, isShop, isSeason,\n      topEyebrow, topTitle,\n      syncDot: syncInfo.dot,\n      openSettings: () => this.openSettings(),\n      navItems, weekTabs,\n      days, noResults,\n      showProgressBar: (this.props.showProgress !== false) && isPlan,\n      progressPct, progressLabel, progressCount,\n      search: st.search, onSearch: (e) => this.onSearch(e),\n      filterChips,\n      prepItems, showPrep,\n      todayMeals, todayPrep,\n      shopSections,\n      seasonCards,\n      swapOpen, swapTitle, swapList, swapHasOverride,\n      swapCreating, swapListing,\n      swapEyebrow: swapCreating ? 'Neues Rezept' : 'Gericht tauschen',\n      swapHeader: swapCreating ? 'Eigenes Gericht' : swapTitle,\n      customList, hasCustom: customList.length > 0,\n      startCreate: () => this.startCreate(),\n      cancelCreate: () => this.cancelCreate(),\n      draftTitle: draft.title, draftIngText: draft.ingText, draftStepText: draft.stepText,\n      draftHasPhoto: !!draft.photo, draftNoPhoto: !draft.photo,\n      draftPhotoEl: draft.photo ? React.createElement('img', {src: draft.photo, alt:'', style:{width:'100%',height:'170px',objectFit:'cover',borderRadius:'14px',display:'block'}}) : null,\n      onDraftTitle: (e) => this.onDraftTitle(e),\n      onDraftIng: (e) => this.onDraftIng(e),\n      onDraftStep: (e) => this.onDraftStep(e),\n      onPhoto: (e) => this.onPhoto(e),\n      removeDraftPhoto: (e) => this.removeDraftPhoto(e),\n      iconOptions,\n      saveCustom: () => this.saveCustom(),\n      saveOpacity: draft.title.trim() ? '1' : '.5',\n      closeSwap: () => this.closeSwap(),\n      swapResetBtn: () => this.resetSwap(st.swapFor),\n\n      // settings sheet\n      settingsOpen: st.settingsOpen,\n      closeSettings: () => this.closeSettings(),\n      syncStatusDot: syncInfo.dot,\n      syncStatusLabel: syncInfo.label,\n      syncIsOn: st.syncStatus === 'on',\n      syncMsg: st.syncMsg, hasSyncMsg: !!st.syncMsg,\n      household: st.household, cfgText: st.cfgText,\n      onHousehold: (e) => this.onHousehold(e),\n      onCfgText: (e) => this.onCfgText(e),\n      saveSync: () => this.saveSync(),\n      disconnectSync: () => this.disconnectSync(),\n      recipeCount,\n      exportRecipes: () => this.exportRecipes(),\n      onImportFile: (e) => this.onImportFile(e),\n      appVersion: this.APP_VERSION,\n      checkUpdate: () => this.checkUpdate()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
